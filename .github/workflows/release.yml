name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Self-hosted macOS ARM build (M1/M2) ───────────────
  build-macos-arm:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v6

      - name: Install frontend dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test && cd core && cargo test

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Create styled DMG
        if: always()
        continue-on-error: true
        run: |
          APP="core/target/release/bundle/macos/Novelist.app"
          DMG="core/target/release/bundle/dmg/Novelist_${{ github.ref_name }}_aarch64.dmg"
          if [ ! -f "$DMG" ]; then
            bash scripts/create-dmg.sh "$APP" "$DMG"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: novelist-macos-aarch64
          path: |
            core/target/release/bundle/dmg/*.dmg
            core/target/release/bundle/macos/*.app.tar.gz
            core/target/release/bundle/macos/*.app.tar.gz.sig

  # ── GitHub-hosted builds (Intel Mac, Linux, Windows) ──
  build-other:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          # macos-13 is the last GitHub-hosted Intel runner; needed for the
          # Homebrew Cask intel: sha256 entry. ARM mac is built on the
          # self-hosted runner above.
          - platform: macos-13
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm test && cd core && cargo test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: core
          tagName: ${{ github.ref_name }}
          releaseName: 'Novelist ${{ github.ref_name }}'
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true

  # ── Create GitHub Release with ARM artifacts + updater JSON ──
  release:
    needs: [build-macos-arm, build-other]
    runs-on: ubuntu-latest
    if: ${{ needs.build-macos-arm.result == 'success' || needs.build-other.result == 'success' }}
    steps:
      - name: Download macOS ARM artifact
        uses: actions/download-artifact@v6
        with:
          name: novelist-macos-aarch64
          path: artifacts/
        continue-on-error: true

      - name: Upload ARM DMG + updater files to Release
        if: hashFiles('artifacts/**/*.dmg') != '' || hashFiles('artifacts/**/*.tar.gz') != ''
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sig
          tag_name: ${{ github.ref_name }}

      # `tauri-action` runs only on the Linux + Windows matrix legs, so the
      # `latest.json` it generates contains only the linux-* and windows-*
      # platform entries. The macOS ARM job is self-hosted and bypasses
      # tauri-action entirely, which means without this step macOS users
      # would never see updates surfaced via the updater plugin. Inject the
      # darwin-aarch64 entry by reading the .app.tar.gz.sig produced by the
      # ARM build and merging it into the existing latest.json.
      - name: Patch latest.json with darwin-aarch64 entry
        if: hashFiles('artifacts/**/*.app.tar.gz.sig') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          SIG_FILE=$(find artifacts -name 'Novelist.app.tar.gz.sig' -print -quit)
          if [ -z "$SIG_FILE" ]; then
            echo "No darwin signature file found; skipping latest.json patch."
            exit 0
          fi
          SIG=$(tr -d '\n' < "$SIG_FILE")
          URL="https://github.com/$REPO/releases/download/$TAG/Novelist.app.tar.gz"

          # Wait briefly for tauri-action's latest.json upload to settle in
          # case this job races ahead of the matrix legs' final asset push.
          for attempt in 1 2 3 4 5; do
            if gh release download "$TAG" --pattern latest.json --output latest.json --repo "$REPO" --clobber 2>/dev/null; then
              break
            fi
            echo "latest.json not yet available (attempt $attempt); retrying in 10s..."
            sleep 10
          done
          if [ ! -s latest.json ]; then
            echo "Could not fetch latest.json from release after retries; aborting." >&2
            exit 1
          fi

          jq --arg sig "$SIG" --arg url "$URL" \
             '.platforms["darwin-aarch64"] = { signature: $sig, url: $url }' \
             latest.json > latest.json.new
          mv latest.json.new latest.json

          echo "--- Patched latest.json ---"
          jq '.platforms | keys' latest.json
          gh release upload "$TAG" latest.json --clobber --repo "$REPO"

  # ── Bump Homebrew Cask in Saber-AI-Research/homebrew-novelist ──
  # Downloads the just-published mac DMGs, computes sha256, rewrites
  # Casks/novelist.rb in the tap repo, and pushes. Requires a PAT in
  # the HOMEBREW_TAP_TOKEN secret with `contents:write` on the tap repo.
  bump-tap:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ needs.release.result == 'success' }}
    steps:
      - name: Download mac DMGs from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          mkdir -p dmgs
          # Both DMGs may upload at slightly different times; retry briefly.
          for attempt in 1 2 3 4 5 6; do
            gh release download "$TAG" --repo "$REPO" --dir dmgs --clobber \
              --pattern "Novelist_${VERSION}_aarch64.dmg" \
              --pattern "Novelist_${VERSION}_x64.dmg" && break || true
            echo "DMGs not yet available (attempt $attempt); retrying in 15s..."
            sleep 15
          done
          ARM_DMG="dmgs/Novelist_${VERSION}_aarch64.dmg"
          INTEL_DMG="dmgs/Novelist_${VERSION}_x64.dmg"
          if [ ! -s "$ARM_DMG" ] || [ ! -s "$INTEL_DMG" ]; then
            echo "Missing DMGs; cannot bump cask." >&2
            ls -la dmgs/ || true
            exit 1
          fi
          ARM_SHA=$(sha256sum "$ARM_DMG"   | awk '{print $1}')
          INTEL_SHA=$(sha256sum "$INTEL_DMG" | awk '{print $1}')
          {
            echo "VERSION=$VERSION"
            echo "ARM_SHA=$ARM_SHA"
            echo "INTEL_SHA=$INTEL_SHA"
          } >> "$GITHUB_ENV"

      - name: Checkout tap repo
        uses: actions/checkout@v6
        with:
          repository: Saber-AI-Research/homebrew-novelist
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render Casks/novelist.rb
        run: |
          set -euo pipefail
          mkdir -p tap/Casks
          cat > tap/Casks/novelist.rb <<EOF
          cask "novelist" do
            arch arm: "aarch64", intel: "x64"

            version "${VERSION}"
            sha256 arm:   "${ARM_SHA}",
                   intel: "${INTEL_SHA}"

            url "https://github.com/Saber-AI-Research/Novelist/releases/download/v#{version}/Novelist_#{version}_#{arch}.dmg",
                verified: "github.com/Saber-AI-Research/Novelist/"
            name "Novelist"
            desc "Lightweight WYSIWYG Markdown desktop writing app for novelists"
            homepage "https://github.com/Saber-AI-Research/Novelist"

            livecheck do
              url :url
              strategy :github_latest
            end

            auto_updates true

            app "Novelist.app"

            zap trash: [
              "~/Library/Application Support/com.novelist.desktop",
              "~/Library/Caches/com.novelist.desktop",
              "~/Library/Logs/com.novelist.desktop",
              "~/Library/Preferences/com.novelist.desktop.plist",
              "~/Library/Saved Application State/com.novelist.desktop.savedState",
              "~/.novelist",
            ]
          end
          EOF

      - name: Commit and push to tap
        run: |
          set -euo pipefail
          cd tap
          git config user.name  "novelist-release-bot"
          git config user.email "release-bot@novelist.dev"
          if git diff --quiet -- Casks/novelist.rb; then
            echo "Cask already up to date; nothing to commit."
            exit 0
          fi
          git add Casks/novelist.rb
          git commit -m "novelist ${VERSION}"
          git push origin HEAD
