[plugin]
id = "canvas"
name = "Canvas Editor"
version = "1.0.0"
description = "Visual canvas editor for .canvas files with drag-and-drop nodes"
author = "Novelist Team"
permissions = ["read", "write", "ui"]

[ui]
type = "file-handler"
entry = "index.html"
file_extensions = [".canvas"]
label = "Canvas"
